<!doctype html>
<!-- Upload page — disposable local-test adapter over the PROVEN HTTP contract.
     No business logic here: it only builds the same JSON any client would POST to
     /v1/documents:validate, then renders the envelope (and polls a pending job).
     No PII in this file; documents only transit at runtime in the browser. -->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>OCR BiFunction — Dépôt de documents</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 46rem; color: #222; }
    h1 { font-size: 1.3rem; }
    fieldset { border: 1px solid #ccc; border-radius: 8px; padding: 1rem 1.2rem; }
    label { display: block; margin: 0.8rem 0 0.3rem; font-weight: 600; }
    select, input[type=file] { font-size: 1rem; }
    button { margin-top: 1rem; padding: 0.5rem 1.4rem; font-size: 1rem; cursor: pointer; }
    #result { margin-top: 1.5rem; padding: 1rem 1.2rem; border-radius: 8px; display: none; }
    #result.ok   { background: #e7f6e7; border: 1px solid #7c7; display: block; }
    #result.warn { background: #fff7e0; border: 1px solid #dbb84d; display: block; }
    #result.wait { background: #e8f0fe; border: 1px solid #7aa7e8; display: block; }
    #result h2 { margin: 0 0 0.4rem; font-size: 1.05rem; }
    ul { margin: 0.3rem 0 0; padding-left: 1.2rem; }
    .muted { color: #666; font-size: 0.85rem; }
    a { color: #2a5db0; }
  </style>
</head>
<body>
  <h1>OCR BiFunction — Dépôt de documents</h1>
  <p class="muted">Maquette locale : les fichiers partent vers <code>POST /v1/documents:validate</code>.
     File de revue humaine : <a href="/review">page revue</a> ·
     Politiques d'exécution : <a href="/policies">page politiques</a> ·
     Registre des organismes : <a href="/registry">page registre</a>.</p>

  <fieldset>
    <label for="document_type">Type de document</label>
    <select id="document_type"><option value="">(détection automatique)</option></select>

    <label for="processing_mode">Mode de traitement (optionnel — la politique du serveur peut l'ignorer)</label>
    <select id="processing_mode">
      <option value="">(politique du serveur)</option>
      <option value="sync">sync — dans la requête</option>
      <option value="async_immediate">async_immediate — file continue</option>
      <option value="async_nightly">async_nightly — passe de nuit</option>
    </select>

    <label for="expected_holder">Titulaire attendu (optionnel — saisi à la main, nourrit le contrôle anti-fraude reconcile_ci)</label>
    <input type="text" id="expected_holder" placeholder="ex. NOM Prénom du dossier" style="width: 24rem" />

    <label for="files">Fichier(s) — une soumission (ex. recto + verso, ou un PDF combiné)</label>
    <input type="file" id="files" multiple />

    <button id="submit">Soumettre</button>
  </fieldset>

  <div id="result"></div>

  <script>
    const resultPanel = document.getElementById("result");
    const typeSelect = document.getElementById("document_type");

    // The select box is DERIVED from the server's template categories, never hardcoded.
    fetch("/v1/document-types").then(r => r.json()).then(body => {
      for (const documentType of body.document_types) {
        const option = document.createElement("option");
        option.value = documentType;
        option.textContent = documentType;
        typeSelect.appendChild(option);
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]); // strip data: prefix
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function render(kind, title, lines) {
      resultPanel.className = kind;
      resultPanel.innerHTML = "<h2>" + title + "</h2>" +
        (lines.length ? "<ul>" + lines.map(l => "<li>" + l + "</li>").join("") + "</ul>" : "");
    }

    async function pollJob(jobId) {
      const job = await (await fetch("/v1/jobs/" + jobId)).json();
      if (job.status === "done") {
        render(job.verdict === "auto" ? "ok" : "warn",
               "Job " + jobId + " terminé — verdict : " + (job.verdict ?? "aucun"),
               job.reasons ?? []);
        return;
      }
      render("wait", "Job " + jobId + " en cours (escalade)…", job.reasons ?? []);
      setTimeout(() => pollJob(jobId), 2000);
    }

    document.getElementById("submit").addEventListener("click", async () => {
      const files = [...document.getElementById("files").files];
      if (!files.length) { render("warn", "Aucun fichier sélectionné", []); return; }
      render("wait", "Envoi + lecture en cours…", []);
      const payload = {
        files: await Promise.all(files.map(async f =>
          ({ filename: f.name, content_base64: await fileToBase64(f) }))),
      };
      if (typeSelect.value) payload.document_type = typeSelect.value;
      const modeSelect = document.getElementById("processing_mode");
      if (modeSelect.value) payload.processing_mode = modeSelect.value;
      const expectedHolder = document.getElementById("expected_holder").value.trim();
      if (expectedHolder) payload.expected_holder_name = expectedHolder;
      const response = await fetch("/v1/documents:validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const body = await response.json();
      if (response.status === 400 || response.status === 500) {
        render("warn", "Erreur " + response.status, [body.detail ?? ""]); return;
      }
      const lines = [...(body.reasons ?? [])];
      if (body.missing?.length) lines.push("côté(s) manquant(s) : " + body.missing.join(", "));
      if (body.job_id != null) lines.push("job D1 : #" + body.job_id);
      if (body.status === "pending") { render("wait", "En attente — traitement asynchrone (doute escaladé ou politique d'exécution)", lines); pollJob(body.job_id); return; }
      render(body.status === "validated" ? "ok" : "warn",
             "Résultat : " + body.status + (body.verdict ? " (" + body.verdict + ")" : ""), lines);
    });
  </script>
</body>
</html>
