<!doctype html>
<!-- Review page — disposable local-test adapter of destination domain 3 (the human surface).
     It only READS D1 (the needs_review queue) and WRITES D3 (decision / suggestion validation)
     through the review endpoints; the watchdog closes D1 on its next sweep. Known-template
     suggestions show their criteria READ-ONLY; a DRAFT suggestion (drafting lane) shows its
     candidate checks as checkboxes — the ticking writes the required block at promotion
     (compute-all/config-requires). No PII in this file. -->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>OCR BiFunction — Revue humaine</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 60rem; color: #222; }
    h1 { font-size: 1.3rem; }  h2 { font-size: 1.1rem; margin-top: 2rem; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 0.9rem 1.1rem; margin: 0.8rem 0; }
    .card h3 { margin: 0 0 0.4rem; font-size: 1rem; }
    .side-by-side { display: flex; gap: 1rem; align-items: flex-start; }
    .doc-preview { flex: 0 0 46%; max-width: 46%; }
    .doc-preview img { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; }
    .doc-preview embed { width: 100%; height: 26rem; border: 1px solid #ddd; border-radius: 4px; }
    .doc-details { flex: 1; min-width: 0; }
    .fields td { padding: 0.1rem 0.8rem 0.1rem 0; font-size: 0.9rem; }
    ul { margin: 0.3rem 0; padding-left: 1.2rem; font-size: 0.9rem; }
    .muted { color: #666; font-size: 0.85rem; }
    .criteria { background: #f6f6f6; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 0.85rem; }
    button { padding: 0.35rem 1rem; cursor: pointer; margin-right: 0.5rem; }
    button.accept { background: #e7f6e7; }  button.reject { background: #fdeaea; }
    input[type=text] { width: 24rem; }
    .done { color: #2a7a2a; font-weight: 600; }
    a { color: #2a5db0; }
  </style>
</head>
<body>
  <h1>OCR BiFunction — Revue humaine</h1>
  <p class="muted">Vos décisions écrivent D3 ; le watchdog clôt les jobs D1 à son prochain passage
     (l'UI ne touche jamais <code>D1.status</code>). Dépôt : <a href="/">page upload</a>.</p>

  <h2>File de revue (D1 <code>needs_review</code>)</h2>
  <div id="queue"><p class="muted">Chargement…</p></div>

  <h2>Suggestions de templates en attente (D3 <code>pending</code>)</h2>
  <div id="suggestions"><p class="muted">Chargement…</p></div>

  <script>
    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // The retained document rendered NEXT TO its extraction, so the reviewer judges the
    // extraction itself (doc + fields side by side), not just the record.
    const IMAGE_SUFFIXES = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp"];

    function documentPreview(documents) {
      if (!documents || !documents.length) {
        return '<p class="muted">Document non retenu (traité avant la rétention, ou purgé).</p>';
      }
      return documents.map(doc => {
        if (IMAGE_SUFFIXES.includes(doc.suffix)) {
          return `<img src="${doc.url}" alt="${escapeHtml(doc.filename)}" />`;
        }
        if (doc.suffix === ".pdf") {
          return `<embed src="${doc.url}" type="application/pdf" />`;
        }
        return `<p><a href="${doc.url}" target="_blank">${escapeHtml(doc.filename)}</a></p>`;
      }).join("");
    }

    async function loadQueue() {
      const body = await (await fetch("/v1/reviews/queue")).json();
      const container = document.getElementById("queue");
      if (!body.jobs.length) { container.innerHTML = '<p class="muted">File vide.</p>'; return; }
      container.innerHTML = body.jobs.map(job => `
        <div class="card">
          <h3>#${job.job_id} — ${escapeHtml(job.source)} <span class="muted">[${job.category_lane}${job.template_id ? " / " + escapeHtml(job.template_id) : ""}]</span></h3>
          <div class="side-by-side">
            <div class="doc-preview">${documentPreview(job.documents)}</div>
            <div class="doc-details">
              ${Object.keys(job.record_fields).length ? "<table class='fields'>" +
                Object.entries(job.record_fields).map(([name, value]) =>
                  `<tr><td>${escapeHtml(name)}</td><td><b>${escapeHtml(value ?? "—")}</b></td></tr>`).join("") + "</table>" : ""}
              <ul>${job.reasons.map(reason => `<li>${escapeHtml(reason)}</li>`).join("")}</ul>
              ${job.decision
                ? `<p class="done">Décision enregistrée : ${job.decision} (clôture au prochain passage du watchdog)</p>`
                : `<input type="text" id="comment_${job.job_id}" placeholder="commentaire (optionnel)" />
                   <div style="margin-top:0.5rem">
                     <button class="accept" onclick="decide(${job.job_id}, 'accept')">Accepter</button>
                     <button class="reject" onclick="decide(${job.job_id}, 'reject')">Rejeter</button>
                   </div>`}
            </div>
          </div>
        </div>`).join("");
    }

    async function decide(jobId, decision) {
      const comment = document.getElementById("comment_" + jobId)?.value || null;
      await fetch(`/v1/reviews/${jobId}/decision`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ decision, comment }),
      });
      loadQueue();
    }

    // Draft suggestions: candidate checks by review_id — the ticking selects among
    // them (the human never authors rules here), the subset becomes `required`.
    const draftCandidatesByReview = {};

    function roleSelect(reviewId, roleKey, fieldNames) {
      return `<select class="role_${reviewId}" data-role="${roleKey}">
          <option value="">(aucun)</option>
          ${fieldNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("")}
        </select>`;
    }

    function draftBlock(suggestion) {
      const draft = suggestion.draft_template;
      draftCandidatesByReview[suggestion.review_id] = suggestion.validation.required || [];
      const fieldNames = draft.fields.map(field => field.name);
      return `
          <p class="muted">DRAFT complet (lane drafting) — champs extraits sur tout le cluster :</p>
          <ul>${draft.fields.map(field =>
            `<li><b>${escapeHtml(field.name)}</b> <span class="muted">[${escapeHtml(field.direction || "pattern")} de « ${escapeHtml(field.anchor || field.pattern)} »]</span></li>`).join("")}</ul>
          <div class="criteria"><b>Checks candidats — cochez ceux qui deviennent REQUIS</b>
            (tout est calculé ; le template dit ce qui est exigé) :<br/>
            ${(suggestion.validation.required || []).map((rule, index) =>
              `<label><input type="checkbox" class="check_${suggestion.review_id}" data-index="${index}" checked />
                 ${escapeHtml(rule.check)} — ${escapeHtml(rule.field)}</label><br/>`).join("")}
          </div>
          <div class="criteria" style="margin-top:0.5rem"><b>Rôles d'attestation (optionnel — métier)</b> :
            si les documents de ce template doivent CORROBORER des titres (corroborated_by),
            désignez les 3 rôles parmi les champs du draft — les 3, ou aucun :<br/>
            titulaire ${roleSelect(suggestion.review_id, "holder_field", fieldNames)}
            délivrance ${roleSelect(suggestion.review_id, "issue_date_field", fieldNames)}
            expiration ${roleSelect(suggestion.review_id, "expiry_date_field", fieldNames)}
          </div>`;
    }

    function readOnlyBlock(suggestion) {
      return `
          <div class="criteria"><b>Critères d'auto-validation du template</b> (lecture seule — v1) :
            <pre>${escapeHtml(JSON.stringify(suggestion.validation, null, 2))}</pre></div>`;
    }

    async function loadSuggestions() {
      const body = await (await fetch("/v1/suggestions/pending")).json();
      const container = document.getElementById("suggestions");
      if (!body.suggestions.length) { container.innerHTML = '<p class="muted">Aucune suggestion en attente.</p>'; return; }
      container.innerHTML = body.suggestions.map(suggestion => `
        <div class="card">
          <h3>Review #${suggestion.review_id} (job #${suggestion.job_id}) → template
              <b>${escapeHtml(suggestion.template_id)}</b></h3>
          <p class="muted">Anchors confirmés sur l'OCR :</p>
          <ul>${suggestion.anchors.map(anchor => `<li>${escapeHtml(anchor)}</li>`).join("")}</ul>
          ${suggestion.draft_template ? draftBlock(suggestion) : readOnlyBlock(suggestion)}
          <div style="margin-top:0.5rem">
            <button class="accept" onclick="actOnSuggestion(${suggestion.review_id}, 'validate')">Valider → activer en D2</button>
            <button class="reject" onclick="actOnSuggestion(${suggestion.review_id}, 'reject')">Rejeter</button>
          </div>
        </div>`).join("");
    }

    async function actOnSuggestion(reviewId, action) {
      const options = { method: "POST" };
      const candidates = draftCandidatesByReview[reviewId];
      if (action === "validate" && candidates && candidates.length) {
        const ticked = [...document.querySelectorAll(`.check_${reviewId}`)]
          .filter(box => box.checked)
          .map(box => candidates[Number(box.dataset.index)]);
        const body = { required: ticked };
        const roles = {};
        for (const select of document.querySelectorAll(`.role_${reviewId}`)) {
          if (select.value) roles[select.dataset.role] = select.value;
        }
        if (Object.keys(roles).length === 3) body.reference_roles = roles;
        options.headers = { "Content-Type": "application/json" };
        options.body = JSON.stringify(body);
      }
      await fetch(`/v1/suggestions/${reviewId}/${action}`, options);
      loadSuggestions();
    }

    loadQueue();
    loadSuggestions();
  </script>
</body>
</html>
